# Netlify — hosting del frontend (web). El backend va en Render (ver DEPLOY.md).
[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

# Proxy de la API al backend en Render (reemplaza la URL por la tuya de Render).
# Así el navegador llama al mismo dominio y no hay problemas de CORS.
[[redirects]]
  from = "/api/*"
  to = "https://li-estetic-connect-privado.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
